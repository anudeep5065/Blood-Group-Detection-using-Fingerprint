<!DOCTYPE html>
<html>
<head>
    <title>Emergency Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f7797d, #FBD786, #C6FFDD);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            animation: fadeIn 1s ease-in;
        }

        h1, h2 {
            text-align: center;
            color: #222;
            animation: slideDown 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .form-container {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 20px;
            animation: fadeIn 1.2s ease;
        }

        .btn {
            border-radius: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }

        .list-group-item {
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .list-group-item:hover {
            background-color: #f8f9fa;
            transform: scale(1.02);
        }

        .blood-box {
            width: 25px;
            height: 25px;
            border-radius: 5px;
            display: inline-block;
            margin-right: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 0.9rem;
        }

        .example-card {
            margin-top: 25px;
        }

        .example-card h5 {
            color: #b30000;
        }
    </style>
</head>

<body class="container py-4">
    <h1><i class="bi bi-activity text-danger"></i> Emergency Blood Requests</h1>

    <div class="form-container">
        <form action="/emergency" method="POST">
            <div class="mb-3">
                <label><span class="blood-box" style="background:#dc3545;"></span>Blood Group Needed:</label>
                <input name="blood_group" class="form-control" placeholder="e.g. O+, B-, A+" required>
            </div>

            <div class="mb-3">
                <label><span class="blood-box" style="background:#0d6efd;"></span>Location:</label>
                <input name="location" class="form-control" placeholder="e.g. City Hospital, Pune" required>
            </div>

            <div class="mb-3">
                <label><span class="blood-box" style="background:#ffc107;"></span>Description:</label>
                <textarea name="description" class="form-control" rows="2" placeholder="e.g. Accident emergency, immediate transfusion needed" required></textarea>
            </div>

            <button type="submit" class="btn btn-danger w-100">
                <i class="bi bi-droplet-half"></i> Post Request
            </button>
        </form>
    </div>

    <div class="example-card">
        <h2><i class="bi bi-list-ul"></i> Existing Requests</h2>
        <ul class="list-group mt-3">
            {% for req in requests %}
            <li class="list-group-item">
                <div class="blood-box" 
                     style="background: {% if req.blood_group_needed == 'O+' %}#dc3545{% elif req.blood_group_needed == 'A+' %}#198754{% elif req.blood_group_needed == 'B+' %}#0d6efd{% elif req.blood_group_needed == 'AB+' %}#6f42c1{% else %}#fd7e14{% endif %};">
                </div>
                <strong><i class="bi bi-droplet"></i> {{ req.blood_group_needed }}</strong>  
                — <i class="bi bi-geo-alt"></i> {{ req.location }}  
                <span class="text-muted">| {{ req.description }}</span>
            </li>
            {% else %}
            <li class="list-group-item text-muted text-center">No active emergency requests.</li>
            {% endfor %}
        </ul>
    </div>

    <div class="mt-4 text-center">
        <a href="/dashboard" class="btn btn-secondary">
            <i class="bi bi-arrow-left-circle"></i> Back to Dashboard
        </a>
    </div>

    <div class="footer">
        <p>💡 Stay Healthy | © 2025 HealthTrack Systems</p>
    </div>
</body>
</html>
