<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f7797d, #FBD786, #C6FFDD);
            background-size: 300% 300%;
            animation: gradientMove 8s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            padding: 40px;
            text-align: center;
            width: 600px;
            animation: fadeInUp 1.3s ease;
        }

        @keyframes fadeInUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #dc3545;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 4rem;
            color: #dc3545;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); color: #dc3545; }
            50% { transform: scale(1.1); color: #ff5e5e; }
            100% { transform: scale(1); color: #dc3545; }
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #333;
        }

        strong {
            color: #000;
        }

        .btn {
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            color: #555;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="result-card">
        <div class="logo"><i class="bi bi-droplet-half"></i></div>
        <h1>Prediction Result</h1>

        <p>
            <span class="color-box" style="background:#dc3545;"></span>
            <strong>Predicted Blood Group:</strong>
            <span class="text-danger fw-bold">{{ blood_group }}</span>
        </p>

        <p>
            <span class="color-box" style="background:#0d6efd;"></span>
            <strong>Confidence Level:</strong> 
            <span class="text-primary">{{ confidence }}%</span>
        </p>

        <p class="mt-4">
            <strong>Note:</strong> This prediction is not automatically saved.<br>
            Copy it and visit your dashboard to manually add or edit your blood group.
        </p>

        <div class="mt-4">
            <a href="/dashboard" class="btn btn-danger me-2">
                <i class="bi bi-speedometer2"></i> Go to Dashboard
            </a>
            <a href="/upload" class="btn btn-outline-primary">
                <i class="bi bi-cloud-upload"></i> Upload Another
            </a>
        </div>

        <div class="footer mt-4">
            💡 Stay Healthy | © 2025 HealthTrack Systems
        </div>
    </div>
</body>
</html>
