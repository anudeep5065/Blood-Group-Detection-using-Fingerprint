<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #C6FFDD, #FBD786, #f7797d);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-card {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            padding: 30px;
            width: 400px;
            text-align: center;
            animation: slideUp 1.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .btn {
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .logo {
            font-size: 3rem;
            color: #dc3545;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); color: #dc3545; }
            50% { transform: scale(1.1); color: #ff6f61; }
            100% { transform: scale(1); color: #dc3545; }
        }

        input {
            border-radius: 10px !important;
        }

        .footer {
            font-size: 0.9rem;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo"><i class="bi bi-fingerprint"></i></div>
        <h1><strong>Login</strong></h1>
        <p class="text-muted">Access your <span class="text-danger">Health Profile</span> securely</p>

        <form action="/login" method="POST">
            <div class="mb-3 text-start">
                <label><span class="color-box" style="background:#0d6efd;"></span>Email:</label>
                <input type="email" name="email" class="form-control" placeholder="e.g. arya.verma@email.com" required>
            </div>

            <div class="mb-3 text-start">
                <label><span class="color-box" style="background:#dc3545;"></span>Password:</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <p class="mt-3">
            Don't have an account?
            <a href="/register" class="text-decoration-none text-danger"><strong>Register</strong></a>
        </p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="alert alert-info mt-3 text-start">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <div class="footer">
            <p><i class="bi bi-shield-lock"></i> 💡 Stay Healthy | © 2025 HealthTrack Systems</p>
        </div>
    </div>
</body>
</html>
