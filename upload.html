<!DOCTYPE html>
<html>
<head>
    <title>Upload Fingerprint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientFlow 10s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .upload-box {
            background: #ffffffd9;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 600px;
            animation: fadeInUp 1.3s ease;
        }

        @keyframes fadeInUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-weight: 700;
            color: #dc3545;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 4rem;
            color: #dc3545;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); color: #dc3545; }
            50% { transform: scale(1.15); color: #ff5b5b; }
            100% { transform: scale(1); color: #dc3545; }
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #dc3545;
        }

        .btn {
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #555;
        }

        a.btn-secondary:hover {
            background-color: #6c757d;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="upload-box">
        <div class="logo"><i class="bi bi-fingerprint"></i></div>
        <h1><span class="color-box" style="background:#dc3545;"></span> Upload Fingerprint Image</h1>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">
                    <span class="color-box" style="background:#0d6efd;"></span> Choose Image File
                </label>
                <input type="file" name="fingerprint" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-danger mt-3">
                <i class="bi bi-cpu"></i> Predict Blood Group
            </button>
        </form>

        <a href="/dashboard" class="btn btn-outline-secondary mt-3">
            <i class="bi bi-arrow-left-circle"></i> Back to Dashboard
        </a>

        <div class="footer mt-4">
            💡 Stay Healthy | © 2025 HealthTrack Systems
        </div>
    </div>
</body>
</html>
